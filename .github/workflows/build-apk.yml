name: Build APK
on:
  workflow_dispatch:
    inputs:
      build_id: { required: true, type: string }
      app_name: { required: true, type: string }
      package_id: { required: true, type: string }
      site_url: { required: true, type: string }
      orientation: { required: true, type: string }
      fullscreen: { required: true, type: string }
      tv_support: { required: true, type: string }
      icon_url: { required: false, type: string, default: '' }
      callback_url: { required: true, type: string }
      callback_secret: { required: true, type: string }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Install deps
        run: npm install

      - name: Configure app
        env:
          APP_ID: ${{ inputs.package_id }}
          APP_NAME: ${{ inputs.app_name }}
          SITE_URL: ${{ inputs.site_url }}
          ORIENTATION: ${{ inputs.orientation }}
          FULLSCREEN: ${{ inputs.fullscreen }}
          TV_SUPPORT: ${{ inputs.tv_support }}
        run: |
          node scripts/configure.js
          npx cap add android || true
          npx cap sync android

      - name: Apply Android customizations
        env:
          FULLSCREEN: ${{ inputs.fullscreen }}
          ORIENTATION: ${{ inputs.orientation }}
          TV_SUPPORT: ${{ inputs.tv_support }}
        run: |
          python3 <<'PY'
          import os, re, glob
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path) as f: x = f.read()

          fullscreen = os.environ['FULLSCREEN'] == 'true'
          tv = os.environ['TV_SUPPORT'] == 'true'
          orient = os.environ['ORIENTATION']

          if fullscreen:
              x = re.sub(r'android:theme="[^"]*"', 'android:theme="@android:style/Theme.NoTitleBar.Fullscreen"', x, count=1)
          x = re.sub(r'android:screenOrientation="[^"]*"', f'android:screenOrientation="{orient}"', x)

          if tv:
              if 'android.software.leanback' not in x:
                  features = (
                      '    <uses-feature android:name="android.software.leanback" android:required="false" />\n'
                      '    <uses-feature android:name="android.hardware.touchscreen" android:required="false" />\n'
                      '    <uses-feature android:name="android.hardware.faketouch" android:required="false" />\n'
                  )
                  x = x.replace('<application ', features + '    <application ', 1)
              if 'android:banner=' not in x:
                  x = x.replace('<application ', '<application android:banner="@mipmap/ic_launcher" ', 1)
              if 'LEANBACK_LAUNCHER' not in x:
                  leanback = (
                      '<intent-filter>\n'
                      '                <action android:name="android.intent.action.MAIN" />\n'
                      '                <category android:name="android.intent.category.LEANBACK_LAUNCHER" />\n'
                      '            </intent-filter>\n'
                      '            <intent-filter>'
                  )
                  x = re.sub(r'<intent-filter>(?=\s*<action android:name="android\.intent\.action\.MAIN"\s*/>\s*<category android:name="android\.intent\.category\.LAUNCHER")',
                             leanback, x, count=1)

          with open(path, 'w') as f: f.write(x)

          # Override back button: WebView goes back instead of exiting app
          mains = glob.glob('android/app/src/main/java/**/MainActivity.java', recursive=True)
          for mp in mains:
              with open(mp) as f: m = f.read()
              if 'onKeyDown' in m:
                  continue
              inject = (
                  '\n    @Override\n'
                  '    public boolean onKeyDown(int keyCode, android.view.KeyEvent event) {\n'
                  '        if (keyCode == android.view.KeyEvent.KEYCODE_BACK) {\n'
                  '            android.webkit.WebView wv = this.bridge.getWebView();\n'
                  '            if (wv != null && wv.canGoBack()) { wv.goBack(); return true; }\n'
                  '        }\n'
                  '        return super.onKeyDown(keyCode, event);\n'
                  '    }\n'
                  '\n    @Override\n'
                  '    public void onStart() {\n'
                  '        super.onStart();\n'
                  '        try {\n'
                  '            android.webkit.WebView wv = this.bridge.getWebView();\n'
                  '            if (wv != null) {\n'
                  '                wv.setLongClickable(false);\n'
                  '                wv.setHapticFeedbackEnabled(false);\n'
                  '                wv.setOnLongClickListener(new android.view.View.OnLongClickListener() {\n'
                  '                    @Override public boolean onLongClick(android.view.View v) { return true; }\n'
                  '                });\n'
                  '                wv.getSettings().setTextZoom(100);\n'
                  '            }\n'
                  '        } catch (Exception e) {}\n'
                  '    }\n'
              )
              # Insert before the final closing brace of the class
              m2 = re.sub(r'\}\s*\Z', inject + '}\n', m, count=1)
              with open(mp, 'w') as f: f.write(m2)
              print('Patched back button in', mp)
          PY

      - name: Apply custom icon
        if: inputs.icon_url != ''
        env:
          ICON_URL: ${{ inputs.icon_url }}
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick
          curl -sSL "$ICON_URL" -o /tmp/icon-src
          # Normalize to square PNG
          convert /tmp/icon-src -resize 512x512^ -gravity center -extent 512x512 /tmp/icon.png
          declare -A SIZES=( [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )
          for d in "${!SIZES[@]}"; do
            sz=${SIZES[$d]}
            dir="android/app/src/main/res/mipmap-$d"
            mkdir -p "$dir"
            convert /tmp/icon.png -resize ${sz}x${sz} "$dir/ic_launcher.png"
            convert /tmp/icon.png -resize ${sz}x${sz} \
              \( +clone -threshold -1 -negate -fill white -draw "circle $((sz/2)),$((sz/2)) $((sz/2)),0" \) \
              -alpha off -compose CopyOpacity -composite "$dir/ic_launcher_round.png"
            # Foreground for adaptive icon (108dp)
            fsz=$((sz * 108 / 48))
            convert /tmp/icon.png -resize ${fsz}x${fsz} "$dir/ic_launcher_foreground.png" 2>/dev/null || true
          done
          echo "Icon applied."

      - name: Build APK
        working-directory: android
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleDebug 2>&1 | tee ../build.log

      - name: Upload APK to callback
        run: |
          curl -X POST "${{ inputs.callback_url }}" \
            -H "x-callback-secret: ${{ inputs.callback_secret }}" \
            -H "x-build-id: ${{ inputs.build_id }}" \
            -H "x-status: success" \
            --data-binary "@android/app/build/outputs/apk/debug/app-debug.apk"

      - name: Notify failure
        if: failure()
        shell: bash
        run: |
          MESSAGE="$(tail -n 80 build.log 2>/dev/null || echo 'Build failed - check Actions logs')"
          curl -X POST "${{ inputs.callback_url }}" \
            -H "x-callback-secret: ${{ inputs.callback_secret }}" \
            -H "x-build-id: ${{ inputs.build_id }}" \
            -H "x-status: failed" \
            --data-binary "$MESSAGE"
