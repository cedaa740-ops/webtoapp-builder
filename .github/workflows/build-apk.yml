name: Build APK
on:
  workflow_dispatch:
    inputs:
      build_id: { required: true, type: string }
      app_name: { required: true, type: string }
      package_id: { required: true, type: string }
      site_url: { required: true, type: string }
      orientation: { required: true, type: string }
      fullscreen: { required: true, type: string }
      tv_support: { required: true, type: string }
      callback_url: { required: true, type: string }
      callback_secret: { required: true, type: string }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Install deps
        run: npm install

      - name: Configure app
        env:
          APP_ID: ${{ inputs.package_id }}
          APP_NAME: ${{ inputs.app_name }}
          SITE_URL: ${{ inputs.site_url }}
          ORIENTATION: ${{ inputs.orientation }}
          FULLSCREEN: ${{ inputs.fullscreen }}
          TV_SUPPORT: ${{ inputs.tv_support }}
        run: |
          node scripts/configure.js
          npx cap add android || true
          npx cap sync android

      - name: Apply Android customizations
        env:
          FULLSCREEN: ${{ inputs.fullscreen }}
          ORIENTATION: ${{ inputs.orientation }}
          TV_SUPPORT: ${{ inputs.tv_support }}
        run: |
          python3 <<'PY'
          import os, re
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path) as f: x = f.read()

          fullscreen = os.environ['FULLSCREEN'] == 'true'
          tv = os.environ['TV_SUPPORT'] == 'true'
          orient = os.environ['ORIENTATION']

          if fullscreen:
              x = re.sub(r'android:theme="[^"]*"', 'android:theme="@android:style/Theme.NoTitleBar.Fullscreen"', x, count=1)
          x = re.sub(r'android:screenOrientation="[^"]*"', f'android:screenOrientation="{orient}"', x)

          if tv:
              # 1) uses-feature tags before <application>
              if 'android.software.leanback' not in x:
                  features = (
                      '    <uses-feature android:name="android.software.leanback" android:required="false" />\n'
                      '    <uses-feature android:name="android.hardware.touchscreen" android:required="false" />\n'
                      '    <uses-feature android:name="android.hardware.faketouch" android:required="false" />\n'
                  )
                  x = x.replace('<application ', features + '    <application ', 1)

              # 2) android:banner attribute on <application>
              if 'android:banner=' not in x:
                  x = x.replace('<application ', '<application android:banner="@mipmap/ic_launcher" ', 1)

              # 3) LEANBACK_LAUNCHER intent-filter inside MainActivity (add a sibling to the existing LAUNCHER intent-filter)
              if 'LEANBACK_LAUNCHER' not in x:
                  leanback = (
                      '<intent-filter>\n'
                      '                <action android:name="android.intent.action.MAIN" />\n'
                      '                <category android:name="android.intent.category.LEANBACK_LAUNCHER" />\n'
                      '            </intent-filter>\n'
                      '            <intent-filter>'
                  )
                  # Insert before the existing LAUNCHER intent-filter
                  x = re.sub(r'<intent-filter>(?=\s*<action android:name="android\.intent\.action\.MAIN"\s*/>\s*<category android:name="android\.intent\.category\.LAUNCHER")',
                             leanback, x, count=1)

          with open(path, 'w') as f: f.write(x)
          print(x)
          PY

      - name: Build APK
        working-directory: android
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleDebug 2>&1 | tee ../build.log

      - name: Upload APK to callback
        run: |
          curl -X POST "${{ inputs.callback_url }}" \
            -H "x-callback-secret: ${{ inputs.callback_secret }}" \
            -H "x-build-id: ${{ inputs.build_id }}" \
            -H "x-status: success" \
            --data-binary "@android/app/build/outputs/apk/debug/app-debug.apk"

      - name: Notify failure
        if: failure()
        shell: bash
        run: |
          MESSAGE="$(tail -n 80 build.log 2>/dev/null || echo 'Build failed - check Actions logs')"
          curl -X POST "${{ inputs.callback_url }}" \
            -H "x-callback-secret: ${{ inputs.callback_secret }}" \
            -H "x-build-id: ${{ inputs.build_id }}" \
            -H "x-status: failed" \
            --data-binary "$MESSAGE"
